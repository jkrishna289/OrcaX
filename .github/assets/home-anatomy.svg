<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" width="1280" height="760" role="img" aria-label="Anatomy of the OrcaX home screen: billboard, standard rows, top ten, and the spotlight showcase deeper in the feed">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/>
      <stop offset="1" stop-color="#07090E"/>
    </linearGradient>
    <linearGradient id="bill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1A2130"/>
      <stop offset="0.55" stop-color="#141A26"/>
      <stop offset="1" stop-color="#0E131C"/>
    </linearGradient>
    <linearGradient id="show" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1C1A2E"/>
      <stop offset="1" stop-color="#12111C"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="760" fill="url(#hbg)"/>

  <g font-family="Inter, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="48" y="48" fill="#79839A" font-size="12" letter-spacing="3.5" font-weight="600">ONE SCROLL THROUGH THE HOME FEED</text>

    <!-- screen frame -->
    <rect x="48" y="70" width="740" height="640" rx="12" fill="#0A0D13" stroke="#2A3141"/>

    <!-- billboard -->
    <rect x="49" y="71" width="738" height="212" fill="url(#bill)"/>
    <rect x="80" y="112" width="126" height="26" rx="4" fill="#2C3446"/>
    <rect x="80" y="152" width="300" height="8" rx="4" fill="#3A4459"/>
    <rect x="80" y="170" width="252" height="8" rx="4" fill="#2E374A"/>
    <rect x="80" y="200" width="96" height="30" rx="15" fill="#E9ECF2"/>
    <text x="106" y="220" fill="#0A0D13" font-size="12" font-weight="700">PLAY</text>
    <rect x="188" y="200" width="106" height="30" rx="15" fill="none" stroke="#586178"/>
    <text x="212" y="220" fill="#C3CAD8" font-size="12" font-weight="600">DETAILS</text>
    <g fill="#4A5468">
      <circle cx="700" cy="262" r="3"/><circle cx="714" cy="262" r="3"/>
      <circle cx="728" cy="262" r="3" fill="#A99CFF"/><circle cx="742" cy="262" r="3"/><circle cx="756" cy="262" r="3"/>
    </g>

    <!-- row A -->
    <text x="80" y="322" fill="#C3CAD8" font-size="13" font-weight="600">Continue watching</text>
    <g>
      <rect x="80" y="336" width="152" height="86" rx="6" fill="#171C26" stroke="#A99CFF" stroke-width="2"/>
      <rect x="80" y="416" width="112" height="4" rx="2" fill="#A99CFF"/>
      <rect x="248" y="336" width="152" height="86" rx="6" fill="#151A23" stroke="#2A3141"/>
      <rect x="248" y="416" width="46" height="4" rx="2" fill="#4A5468"/>
      <rect x="416" y="336" width="152" height="86" rx="6" fill="#151A23" stroke="#2A3141"/>
      <rect x="584" y="336" width="152" height="86" rx="6" fill="#151A23" stroke="#2A3141"/>
    </g>

    <!-- row B: top 10 -->
    <text x="80" y="462" fill="#C3CAD8" font-size="13" font-weight="600">Top 10 in this house this week</text>
    <g>
      <text x="74" y="558" fill="#232A38" font-size="86" font-weight="800">1</text>
      <rect x="112" y="476" width="80" height="112" rx="6" fill="#151A23" stroke="#2A3141"/>
      <text x="204" y="558" fill="#232A38" font-size="86" font-weight="800">2</text>
      <rect x="256" y="476" width="80" height="112" rx="6" fill="#151A23" stroke="#2A3141"/>
      <text x="348" y="558" fill="#232A38" font-size="86" font-weight="800">3</text>
      <rect x="400" y="476" width="80" height="112" rx="6" fill="#151A23" stroke="#2A3141"/>
      <text x="492" y="558" fill="#232A38" font-size="86" font-weight="800">4</text>
      <rect x="544" y="476" width="80" height="112" rx="6" fill="#151A23" stroke="#2A3141"/>
      <text x="636" y="558" fill="#232A38" font-size="86" font-weight="800">5</text>
      <rect x="688" y="476" width="80" height="112" rx="6" fill="#151A23" stroke="#2A3141"/>
    </g>

    <!-- spotlight showcase -->
    <rect x="80" y="616" width="656" height="120" rx="10" fill="url(#show)" stroke="#A99CFF" stroke-opacity="0.55"/>
    <rect x="112" y="648" width="104" height="22" rx="3" fill="#2E2A46"/>
    <rect x="112" y="684" width="238" height="7" rx="3" fill="#3A3557"/>
    <rect x="112" y="700" width="180" height="7" rx="3" fill="#2B2842"/>
    <text x="676" y="644" fill="#6B6490" font-size="11" letter-spacing="2">ORCAX</text>

    <!-- fade to indicate the feed continues -->
    <rect x="49" y="700" width="738" height="9" fill="#07090E" opacity="0.85"/>

    <!-- ================= callouts ================= -->
    <g stroke="#39415A" stroke-width="1" stroke-dasharray="3 4">
      <line x1="790" y1="176" x2="852" y2="176"/>
      <line x1="790" y1="378" x2="852" y2="378"/>
      <line x1="790" y1="532" x2="852" y2="532"/>
      <line x1="790" y1="676" x2="852" y2="676"/>
    </g>

    <g>
      <text x="866" y="150" fill="#A99CFF" font-size="12" letter-spacing="2.5" font-weight="700">BILLBOARD</text>
      <text x="866" y="176" fill="#C3CAD8" font-size="13.5">One rotating hero at the top of the feed.</text>
      <text x="866" y="196" fill="#79839A" font-size="13">Logo art, a line of context, play and details.</text>
      <text x="866" y="214" fill="#79839A" font-size="13">The engine picks the rotation, not the client.</text>

      <text x="866" y="352" fill="#A99CFF" font-size="12" letter-spacing="2.5" font-weight="700">ROWS</text>
      <text x="866" y="378" fill="#C3CAD8" font-size="13.5">Resume, new since you were away, more like</text>
      <text x="866" y="398" fill="#79839A" font-size="13">the last thing you finished, mood collections,</text>
      <text x="866" y="416" fill="#79839A" font-size="13">coming soon. Card shape is server&#8209;chosen.</text>

      <text x="866" y="506" fill="#A99CFF" font-size="12" letter-spacing="2.5" font-weight="700">TOP 10</text>
      <text x="866" y="532" fill="#C3CAD8" font-size="13.5">Ranked from what your household actually</text>
      <text x="866" y="552" fill="#79839A" font-size="13">watched, not from a global chart.</text>

      <text x="866" y="650" fill="#A99CFF" font-size="12" letter-spacing="2.5" font-weight="700">SPOTLIGHT SHOWCASE</text>
      <text x="866" y="676" fill="#C3CAD8" font-size="13.5">A single near&#8209;full&#8209;width panel, placed deep in</text>
      <text x="866" y="696" fill="#79839A" font-size="13">the feed, that plays its trailer on focus.</text>
      <text x="866" y="714" fill="#79839A" font-size="13">No row caption, no progress bar &#8212; a moment.</text>
    </g>
  </g>
</svg>
