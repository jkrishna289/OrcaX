<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" role="img" aria-label="How one title moves from requestable to watchable in your own library">
  <defs>
    <linearGradient id="vbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0E14"/><stop offset="1" stop-color="#07090E"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="420" fill="url(#vbg)"/>
  <g font-family="Inter, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="48" y="48" fill="#79839A" font-size="12" letter-spacing="3.5" font-weight="600">ONE STATE MACHINE, RENDERED AS A BADGE ON THE CARD</text>

    <!-- nodes -->
    <g>
      <rect x="48" y="150" width="196" height="120" rx="12" fill="#12151D" stroke="#2A3141"/>
      <text x="70" y="188" fill="#8FA0B8" font-size="13" font-weight="700" letter-spacing="1.5">REQUEST</text>
      <text x="70" y="214" fill="#B9C1D0" font-size="13">Surfaced by discovery,</text>
      <text x="70" y="232" fill="#B9C1D0" font-size="13">not yet in the library.</text>

      <rect x="302" y="150" width="196" height="120" rx="12" fill="#12151D" stroke="#2A3141"/>
      <text x="324" y="188" fill="#E6C06A" font-size="13" font-weight="700" letter-spacing="1.5">REQUESTED</text>
      <text x="324" y="214" fill="#B9C1D0" font-size="13">Sent to your own</text>
      <text x="324" y="232" fill="#B9C1D0" font-size="13">Jellyseerr queue.</text>

      <rect x="556" y="150" width="196" height="120" rx="12" fill="#12151D" stroke="#2A3141"/>
      <text x="578" y="188" fill="#6FA3E6" font-size="13" font-weight="700" letter-spacing="1.5">DOWNLOADING</text>
      <text x="578" y="214" fill="#B9C1D0" font-size="13">Your automation is</text>
      <text x="578" y="232" fill="#B9C1D0" font-size="13">fetching it in.</text>

      <rect x="810" y="150" width="196" height="120" rx="12" fill="#12151D" stroke="#2A3141"/>
      <text x="832" y="188" fill="#7FD8A0" font-size="13" font-weight="700" letter-spacing="1.5">RECENTLY ADDED</text>
      <text x="832" y="214" fill="#B9C1D0" font-size="13">Landed on your</text>
      <text x="832" y="232" fill="#B9C1D0" font-size="13">server, freshly.</text>

      <rect x="1064" y="150" width="168" height="120" rx="12" fill="#141B18" stroke="#2E5A44"/>
      <text x="1086" y="188" fill="#5FE0A0" font-size="13" font-weight="700" letter-spacing="1.5">WATCH NOW</text>
      <text x="1086" y="214" fill="#B9C1D0" font-size="13">In the library.</text>
      <text x="1086" y="232" fill="#B9C1D0" font-size="13">Just press play.</text>
    </g>

    <!-- arrows -->
    <g stroke="#4A5468" stroke-width="1.6" fill="none">
      <line x1="244" y1="210" x2="296" y2="210"/>
      <line x1="498" y1="210" x2="550" y2="210"/>
      <line x1="752" y1="210" x2="804" y2="210"/>
      <line x1="1006" y1="210" x2="1058" y2="210"/>
    </g>
    <g fill="#4A5468">
      <polygon points="302,210 290,205 290,215"/>
      <polygon points="556,210 544,205 544,215"/>
      <polygon points="810,210 798,205 798,215"/>
      <polygon points="1064,210 1052,205 1052,215"/>
    </g>

    <text x="48" y="340" fill="#9AA4B6" font-size="14">The engine reconciles these states against your Jellyseerr and library on a schedule; OrcaX just draws the badge it is told to.</text>
    <text x="48" y="362" fill="#6E7789" font-size="13">Nothing here downloads media by itself. Requests flow only to the request server you configured, and only when you ask.</text>
  </g>
</svg>
